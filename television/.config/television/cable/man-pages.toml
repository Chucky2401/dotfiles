[metadata]
name = "man-pages"
description = "Browse and preview system manual pages"
requirements = ["apropos", "man", "bat"]

[source]
# List all man pages using apropos
command = "apropos . | sort"

[preview]
# Show the man page for the selected entry
command = "man '{0}' | bat --color=always -l man -p"
env = { "MANWIDTH" = "80" }

[keybindings]
enter = "actions:open"

[actions.open]
description = "Open the selected man page in the system pager"
command = "man '{0}' | bat -l man -p"
mode = "execute"

[ui]
layout = "portrait"
preview_panel = { header = "{0}" }
