[metadata]
name = "git-repos"
requirements = ["fd", "git"]
description = """
A channel to select from git repositories on your local machine.

This channel uses `fd` to find directories that contain a `.git` subdirectory, and then allows you to preview the git log of the selected repository.
"""

[source]
# this is a macos version of the command. While perfectly usable on linux, you may want to tweak it a bit.
command = "fd -g .git -H -t d -d 6 --prune ~ -E 'Library' -E 'Application Support' -E '/.*' --exec-batch dirname '{}' | awk -F/ '{print $NF \"\t\" $0}' | sort | cut -f2-"
display = "{split:/:-1}"

[preview]
command = "cd '{}'; printf \"%s\n\n\" \"$(pwd)\"; git log -n 200 --pretty=medium --all --graph --color"

[keybindings]
enter = "actions:cd"
ctrl-e = "actions:edit"

[actions.cd]
description = "Open a new shell in the selected repository"
command = "cd '{}' && $SHELL"
mode = "execute"

[actions.edit]
description = "Open the repository in editor"
command = "${EDITOR:-vim} '{}'"
shell = "bash"
mode = "execute"
